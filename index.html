  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Warner Park &amp; Gardens — Homepage Wireframe<\u002Ftitle>\n  <style>/* Warner Park & Gardens — Color Tokens */\n\n:root {\n  /* ─── Core palette ─── */\n  --color-primary:     #2A4547;   /* Deep teal-green — nav, footer, headings, borders */\n  --color-accent:      #5B8C5A;   /* Sage green — hover states, tags, secondary buttons */\n  --color-ginkgo:      #C9A227;   /* Gold — sparingly: Donate CTAs, pull quotes, leaf motifs */\n  --color-warm:        #E8DCC8;   /* Linen — section-break backgrounds, archival feel */\n  --color-bg:          #FAFAF5;   /* Near-white — default page background */\n  --color-text:        #2D2D2D;   /* Near-black — body copy */\n  --color-text-muted:  #6B6B6B;   /* Captions, metadata, secondary labels */\n\n  /* ─── Surface aliases ─── */\n  --surface-page:      var(--color-bg);\n  --surface-card:      #FFFFFF;\n  --surface-warm:      var(--color-warm);\n  --surface-nav:       var(--color-primary);\n  --surface-footer:    var(--color-primary);\n  --surface-donate:    var(--color-ginkgo);\n  --surface-map:       #DFE8DC;\n\n  /* ─── Text aliases ─── */\n  --text-body:         var(--color-text);\n  --text-muted:        var(--color-text-muted);\n  --text-heading:      var(--color-primary);\n  --text-on-dark:      var(--color-bg);\n  --text-on-dark-muted: var(--color-warm);\n  --text-on-gold:      var(--color-primary);\n  --text-link:         var(--color-accent);\n  --text-footer-muted: #6B8E90;\n\n  /* ─── Border aliases ─── */\n  --border-default:    var(--color-warm);\n  --border-input:      var(--color-warm);\n  --border-subtle:     rgba(232, 220, 200, 0.15);\n\n  /* ─── Tag palette ─── */\n  --tag-sage-bg:       var(--color-accent);\n  --tag-sage-text:     #FFFFFF;\n  --tag-linen-bg:      var(--color-warm);\n  --tag-linen-text:    var(--color-primary);\n  --tag-outline-border: var 7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Serif Display';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e81b45a1-a86d-4484-bbbc-56fc764acb54\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ─── Font families ─── */\n  --font-display:  'DM Serif Display', serif;     /* Headlines, hero text */\n  --font-body:     'DM Sans', sans-serif;          /* Body copy, UI text */\n  --font-mono:     'DM Mono', monospace;            /* Eyebrows, labels, code */\n\n  /* ─── Type scale ─── */\n  --text-5xl:   3.75rem;    /* 60px — Hero headlines */\n  --text-4xl:   2.75rem;    /* 44px — Section heroes */\n  --text-3xl:   2rem;       /* 32px — Section titles */\n  --text-2xl:   1.5rem;     /* 24px — Subheadings (DM Sans 500) */\n  --text-xl:    1.25rem;    /* 20px — Lead paragraphs */\n  --text-lg:    1.125rem;   /* 18px — Large body */\n  --text-base:  1rem;       /* 16px — Body copy */\n  --text-sm:    0.875rem;   /* 14px — Captions, metadata */\n  --text-xs:    0.8125rem;  /* 13px — Labels, eyebrows */\n  --text-2xs:   0.75rem;    /* 12px — Fine print */\n\n  /* ─── Line heights ─── */\n  --leading-tight:   1.05;\n  --leading-snug:    1.15;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.6;\n  --leading-loose:   1.7;\n\n  /* ─── Letter spacing ─── */\n  --tracking-eyebrow: 0.16em;\n  --tracking-eyebrow-wide: 0.18em;\n  --tracking-normal: 0;\n  --tracking-tight: -0.01em;\n\n  /* ─── Font weights ─── */\n  --weight-regular: 400;\n  --weight-medium:  500;\n  --weight-semi:    600;\n  --weight-bold:    700;\n}\n<\u002Fstyle>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n    body {\n      background: #E4E0D8;\n      font-family: var(--font-body);\n      color: var(--color-text);\n      min-height: 100vh;\n    }\n\n    /* ── Control Bar ── */\n    #ctrl {\n      position: fixed;\n      top: 0; left: 0; right: 0;\n      z-index: 1000;\n      background: var(--color-primary);\n      height: 44px;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      padding: 0 20px;\n      gap: 16px;\n    }\n    #ctrl .title {\n      font-family: var(--font-mono);\n      font-size: 11px;\n      letter-spacing: var(--tracking-eyebrow);\n      color: var(--color-warm);\n      text-transform: uppercase;\n      white-space: nowrap;\n    }\n    #ctrl .toggles { display: flex; gap: 4px; }\n    #ctrl button {\n      font-family: var(--font-mono);\n      font-size: 11px;\n      letter-spacing: 0.08em;\n      text-transform: uppercase;\n      border: 1.5px solid rgba(232,220,200,0.35);\n      background: transparent;\n      color: var(--color-warm);\n      border-radius: 20px;\n      padding: 4px 14px;\n      cursor: pointer;\n      transition: all 150ms ease;\n      white-space: nowrap;\n    }\n    #ctrl button.active {\n      background: var(--color-warm);\n      color: var(--color-primary);\n      border-color: var(--color-warm);\n    }\n    #ctrl button:hover:not(.active) { border-color: var(--color-warm); }\n\n    /* ── Stage ── */\n    #stage {\n      margin-top: 44px;\n      padding: 32px 24px 64px;\n      display: flex;\n      justify-content: center;\n      gap: 32px;\n      align-items: flex-start;\n    }\n\n    /* ── Frame ── */\n    .frame {\n      background: var(--color-bg);\n      border-radius: 8px;\n      overflow: hidden;\n      box-shadow: 0 2px 12px rgba(42,69,71,0.18);\n      flex-shrink: 0;\n    }\n    .frame-label {\n      font-family: var(--font-mono);\n      font-size: 11px;\n      letter-spacing: var(--tracking-eyebrow);\n      text-transform: uppercase;\n      color: var(--color-text-muted);\n      text-align: center;\n      margin-bottom: 8px;\n    }\n    .frame-wrap { display: flex; flex-direction: column; }\n\n    body.mode-desktop #wrap-mobile  { display: none; }\n    body.mode-mobile  #wrap-desktop { display: none; }\n    body.mode-desktop #frame-desktop { width: min(1080px, calc(100vw - 48px)); }\n    body.mode-mobile  #frame-mobile  { width: min(375px,  calc(100vw - 48px)); }\n    body.mode-both    #frame-desktop { width: 700px; }\n    body.mode-both    #frame-mobile  { width: 375px; }\n\n    /* ── Wireframe primitives ── */\n    .wf-section {\n      position: relative;\n      border-bottom: 1.5px dashed rgba(42,69,71,0.18);\n    }\n    .sec-label {\n      position: absolute;\n      top: 10px; left: 12px;\n      z-index: 10;\n      font-family: var(--font-mono);\n      font-size: 9px;\n      letter-spacing: 0.14em;\n      text-transform: uppercase;\n      background: var(--color-primary);\n      color: var(--color-warm);\n      padding: 3px 8px;\n      border-radius: 3px;\n      opacity: 0.85;\n      pointer-events: none;\n    }\n    .sec-label-inv {\n      background: var(--color-warm);\n      color: var(--color-primary);\n    }\n\n    /* Hatch pattern for image placeholders */\n    .hatch {\n      background-image: repeating-linear-gradient(\n        -45deg,\n        rgba(42,69,71,0.07) 0px, rgba(42,69,71,0.07) 1px,\n        transparent 1px, transparent 8px\n      );\n      background-color: #CDD5C8;\n    }\n\n    /* Placeholder text helpers */\n    .ph-eyebrow {\n      font-family: var(--font-mono);\n      font-size: 11px;\n      letter-spacing: var(--tracking-eyebrow);\n      text-transform: uppercase;\n      color: var(--color-accent);\n      margin-bottom: 14px;\n    }\n    .ph-eyebrow-light {\n      font-family: var(--font-mono);\n      font-size: 11px;\n      letter-spacing: var(--tracking-eyebrow);\n      text-transform: uppercase;\n      color: var(--color-warm);\n      margin-bottom: 14px;\n    }\n    .ph-h1 {\n      font-family: var(--font-display);\n      color: var(--color-bg);\n      line-height: var(--leading-tight);\n      text-wrap: pretty;\n      margin-bottom: 16px;\n    }\n    .ph-h2 {\n      font-family: var(--font-display);\n      font-size: var(--text-3xl);\n      color: var(--color-primary);\n      line-height: var(--leading-snug);\n      margin-bottom: 18px;\n      text-wrap: pretty;\n    }\n    .ph-h2-gold { color: var(--color-primary); }\n    .ph-body {\n      font-size: var(--text-base);\n      line-height: var(--leading-relaxed);\n      color: var(--color-text);\n      margin-bottom: 10px;\n    }\n    .wf-story .ph-body { margin-bottom: 0; }\n    .ph-body-muted {\n      font-size: var(--text-base);\n      line-height: var(--leading-relaxed);\n      color: rgba(250,250,245,0.75);\n      margin-bottom: 10px;\n    }\n    .ph-caption {\n      font-family: var(--font-mono);\n      font-size: 11px;\n      color: rgba(250,250,245,0.4);\n      letter-spacing: 0.08em;\n      margin-top: 18px;\n    }\n    .ph-link {\n      font-size: var(--text-base);\n      color: var(--color-accent);\n      text-decoration: underline;\n      display: inline-block;\n      margin-top: 8px;\n    }\n    .img-tag {\n      font-family: var(--font-mono);\n      font-size: 9px;\n      text-transform: uppercase;\n      letter-spacing: 0.1em;\n      color: var(--color-primary);\n      opacity: 0.5;\n      text-align: center;\n      padding: 10px;\n    }\n\n    /* Buttons */\n    .btn-gold {\n      background: var(--color-ginkgo);\n      color: var(--color-primary);\n      font-family: var(--font-body);\n      font-weight: 600;\n      border-radius: 28px;\n      padding: 12px 28px;\n      font-size: 15px;\n      display: inline-block;\n    }\n    .btn-ghost {\n      border: 1.5px solid rgba(250,250,245,0.45);\n      color: var(--color-bg);\n      font-family: var(--font-body);\n      font-weight: 500;\n      border-radius: 28px;\n      padding: 12px 28px;\n      font-size: 15px;\n      display:
